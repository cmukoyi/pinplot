services:
  db:
    image: postgres:15-alpine
    container_name: beacon_telematics_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-beacon_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beacon_password}
      POSTGRES_DB: ${POSTGRES_DB:-beacon_telematics}
    volumes:
    - beacon_telematics_postgres_data:/var/lib/postgresql/data
    ports:
    - 5433:5432
    networks:
    - beacon_telematics_network
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U beacon_user
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beacon_telematics_backend
    env_file:
    - ./backend/.env
    ports:
    - 0.0.0.0:8001:8000
    volumes:
    - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
    - beacon_telematics_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
    - MZONE_CLIENT_SECRET=g_SkQ.B.z3TeBU$$g#hVeP#c2
  admin-portal:
    build:
      context: ./admin-portal
      dockerfile: Dockerfile
    container_name: beacon_telematics_admin_portal
    ports:
    - 3010:80
    depends_on:
    - backend
    networks:
    - beacon_telematics_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  customer:
    build:
      context: ./customer-dashboard
      dockerfile: Dockerfile
    container_name: beacon_telematics_customer
    ports:
    - 3011:3001
    volumes:
    - ./customer-dashboard:/app
    - /app/node_modules
    environment:
    - BACKEND_URL=http://backend:8000/api/v1
    depends_on:
    - backend
    networks:
    - beacon_telematics_network
    command: npm start
  flutter-web:
    build:
      context: ./mobile-app
      dockerfile: Dockerfile
    container_name: beacon_telematics_flutter_web
    ports:
    - 3012:80
    depends_on:
    - backend
    networks:
    - beacon_telematics_network
  nginx:
    image: nginx:alpine
    container_name: beacon_telematics_nginx
    ports:
    - 8080:80
    - 8443:443
    volumes:
    - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
    - backend
    - admin-portal
    - customer
    - flutter-web
    networks:
    - beacon_telematics_network
volumes:
  beacon_telematics_postgres_data: null
networks:
  beacon_telematics_network:
    driver: bridge
