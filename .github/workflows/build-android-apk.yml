name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for build'
        required: false
        default: 'Test build'

jobs:
  build-apk:
    name: Build Android Release APKs (split per ABI)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd gps-tracker/mobile-app/ble_tracker_app
          flutter pub get

      - name: Build release APKs (split per ABI)
        run: |
          cd gps-tracker/mobile-app/ble_tracker_app
          flutter build apk --release --split-per-abi
          echo "✅ APKs built"
          ls -lh build/app/outputs/flutter-apk/

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: pinplot-arm64-${{ github.run_number }}
          path: gps-tracker/mobile-app/ble_tracker_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 14

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: pinplot-armv7-${{ github.run_number }}
          path: gps-tracker/mobile-app/ble_tracker_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 14

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: pinplot-x86_64-${{ github.run_number }}
          path: gps-tracker/mobile-app/ble_tracker_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 14
