name: Deploy Beacon Telematics to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual trigger'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1 — Test Backend
  # ─────────────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd gps-tracker/backend
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: |
          cd gps-tracker/backend
          pytest tests/ -v --tb=short
        continue-on-error: false

  # ─────────────────────────────────────────────────────────────────
  # JOB 2 — Build Flutter Web
  # ─────────────────────────────────────────────────────────────────
  build-flutter:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Build Flutter Web
        run: |
          cd gps-tracker/mobile-app/ble_tracker_app
          flutter pub get
          flutter build web --release --no-tree-shake-icons
          echo "✅ Flutter build complete"
          ls -lh build/web/main.dart.js

      - name: Upload Flutter build
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: gps-tracker/mobile-app/ble_tracker_app/build/web/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to Production
  # ─────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-flutter
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download Flutter build
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: gps-tracker/mobile-app/ble_tracker_app/build/web/

      - name: Verify Flutter artifacts
        run: |
          if [ ! -f "gps-tracker/mobile-app/ble_tracker_app/build/web/main.dart.js" ]; then
            echo "❌ Flutter build artifacts missing"
            exit 1
          fi
          echo "✅ Flutter artifacts ready"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.DO_SERVER_IP }} >> ~/.ssh/known_hosts

      # ── Write backend/.env (no heredoc — no indentation issues) ──
      - name: Write backend .env to server
        env:
          DO_SERVER_IP: ${{ secrets.DO_SERVER_IP }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          {
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}"
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}"
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}"
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"
            echo "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}"
            echo "ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}"
            echo "MZONE_TOKEN_URL=https://login.mzoneweb.net/connect/token"
            echo "MZONE_API_BASE=https://live.mzoneweb.net/mzone62.api"
            echo "MZONE_CLIENT_ID=${{ secrets.MZONE_CLIENT_ID }}"
            echo "MZONE_CLIENT_SECRET=${{ secrets.MZONE_CLIENT_SECRET }}"
            echo "MZONE_USERNAME=${{ secrets.MZONE_USERNAME }}"
            echo "MZONE_PASSWORD=${{ secrets.MZONE_PASSWORD }}"
            echo "MZONE_VEHICLE_GROUP_ID=${{ secrets.MZONE_VEHICLE_GROUP_ID }}"
            echo "FROM_EMAIL=${{ secrets.FROM_EMAIL }}"
            echo "DEBUG=False"
            echo "ENVIRONMENT=production"
          } | ssh $DO_USER@$DO_SERVER_IP \
            'mkdir -p ~/beacon-telematics/gps-tracker/backend && \
             cat > ~/beacon-telematics/gps-tracker/backend/.env && \
             chmod 600 ~/beacon-telematics/gps-tracker/backend/.env'
          echo "✅ backend/.env written to server"

      # ── Write root gps-tracker/.env for docker compose interpolation ──
      - name: Write root .env to server
        env:
          DO_SERVER_IP: ${{ secrets.DO_SERVER_IP }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          {
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}"
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"
          } | ssh $DO_USER@$DO_SERVER_IP \
            'cat > ~/beacon-telematics/gps-tracker/.env && \
             chmod 600 ~/beacon-telematics/gps-tracker/.env'
          echo "✅ root .env written to server"

      # ── Sync code (includes pre-built Flutter artifacts) ─────────
      - name: Sync code to server
        env:
          DO_SERVER_IP: ${{ secrets.DO_SERVER_IP }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.gitignore' \
            --exclude 'node_modules' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.dart_tool' \
            --exclude 'beacon_telematics_postgres_data' \
            --exclude 'backend/.env' \
            --exclude '.env' \
            ./gps-tracker/ $DO_USER@$DO_SERVER_IP:~/beacon-telematics/gps-tracker/

          ssh $DO_USER@$DO_SERVER_IP \
            'test -f ~/beacon-telematics/gps-tracker/mobile-app/ble_tracker_app/build/web/main.dart.js \
             && echo "✅ Flutter artifacts on server" \
             || (echo "❌ Flutter artifacts missing on server" && exit 1)'

      # ── Build and deploy containers ───────────────────────────────
      - name: Deploy containers
        env:
          DO_SERVER_IP: ${{ secrets.DO_SERVER_IP }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          ssh $DO_USER@$DO_SERVER_IP 'bash -s' << 'SSHEOF'
            set -e
            cd ~/beacon-telematics/gps-tracker

            echo "━━━ Stopping containers ━━━"
            docker compose down --remove-orphans || true

            echo "━━━ Building UI services (no cache) ━━━"
            docker compose build --no-cache flutter-web admin-portal

            echo "━━━ Building backend services ━━━"
            docker compose build backend customer

            echo "━━━ Starting all containers ━━━"
            docker compose up -d

            echo "━━━ Pruning old images ━━━"
            docker image prune -f

            echo "━━━ Container status ━━━"
            docker compose ps
          SSHEOF

      # ── Wait for DB and run migrations ────────────────────────────
      - name: Run database migrations
        env:
          DO_SERVER_IP: ${{ secrets.DO_SERVER_IP }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          ssh $DO_USER@$DO_SERVER_IP 'bash -s' << 'SSHEOF'
            set -e
            cd ~/beacon-telematics/gps-tracker

            echo "⏳ Waiting for database..."
            for i in $(seq 1 30); do
              if docker exec beacon_telematics_db pg_isready -U beacon_user >/dev/null 2>&1; then
                echo "✅ Database ready"
                break
              fi
              echo "  ↻ attempt $i/30"
              sleep 3
            done

            echo "⏳ Waiting for backend..."
            for i in $(seq 1 20); do
              if docker ps --filter name=beacon_telematics_backend \
                  --format '{{.Status}}' | grep -q 'Up'; then
                echo "✅ Backend running"
                break
              fi
              echo "  ↻ attempt $i/20"
              sleep 3
            done

            echo "🔄 Running Alembic migrations..."
            docker compose exec -T backend alembic upgrade head && \
              echo "✅ Migrations complete" || {
              echo "⚠️  Retrying in 15s..."
              sleep 15
              docker compose exec -T backend alembic upgrade head || {
                echo "❌ Migration failed"
                docker logs --tail 30 beacon_telematics_backend
                exit 1
              }
            }
          SSHEOF

      # ── Health checks ─────────────────────────────────────────────
      - name: Health checks
        env:
          DO_SERVER_IP: ${{ secrets.DO_SERVER_IP }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          check() {
            local NAME="$1" URL="$2" RETRIES="${3:-10}"
            for i in $(seq 1 $RETRIES); do
              if curl -fsS --max-time 5 "$URL" >/dev/null 2>&1; then
                echo "✅ $NAME healthy"
                return 0
              fi
              echo "  ↻ $NAME not ready ($i/$RETRIES)..."
              sleep 5
            done
            echo "❌ $NAME FAILED"
            return 1
          }

          FAILED=0
          check "Backend"      "http://$DO_SERVER_IP:8001/api/health" || FAILED=1
          check "Admin Portal" "http://$DO_SERVER_IP:3010"            || FAILED=1
          check "Flutter Web"  "http://$DO_SERVER_IP:3012"            || FAILED=1
          check "Customer UI"  "http://$DO_SERVER_IP:3011"            || FAILED=1

          if [ "$FAILED" -eq 1 ]; then
            ssh $DO_USER@$DO_SERVER_IP \
              'cd ~/beacon-telematics/gps-tracker && \
               docker compose ps && \
               docker logs --tail 20 beacon_telematics_backend'
            exit 1
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "========================================"
          echo "🚀 Beacon Telematics — Deploy Complete"
          echo "Commit : $(git rev-parse --short HEAD)"
          echo "Branch : ${GITHUB_REF##*/}"
          echo "========================================"
          echo "Backend API : http://${{ secrets.DO_SERVER_IP }}:8001"
          echo "Admin Portal: http://${{ secrets.DO_SERVER_IP }}:3010"
          echo "Flutter Web : http://${{ secrets.DO_SERVER_IP }}:3012"
          echo "Customer UI : http://${{ secrets.DO_SERVER_IP }}:3011"
          echo "Domain      : https://beacontelematics.co.uk"
          echo "========================================"
