name: Deploy Beacon Telematics to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for production deployment'
        required: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
      
      - name: Build Flutter Web App
        run: |
          cd gps-tracker/mobile-app/ble_tracker_app
          flutter pub get
          flutter build web --release --no-tree-shake-icons
          echo "✅ Flutter web build completed"
          ls -lh build/web/main.dart.js
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
      
      - name: Add Digital Ocean to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DO_SERVER_IP }} >> ~/.ssh/known_hosts
      
      - name: Upload Deployment Scripts
        env:
          DO_SERVER_IP: ${{ secrets.DO_SERVER_IP }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          echo "📦 Uploading BeaconTelematics deployment scripts..."
          ssh $DO_USER@$DO_SERVER_IP "mkdir -p ~/beacon-telematics"
          scp deploy/pre-deployment-backup-beacon.sh $DO_USER@$DO_SERVER_IP:~/beacon-telematics/
          scp deploy/verify-secrets-beacon.sh $DO_USER@$DO_SERVER_IP:~/beacon-telematics/
          scp deploy/rollback-deployment-beacon.sh $DO_USER@$DO_SERVER_IP:~/beacon-telematics/
          ssh $DO_USER@$DO_SERVER_IP "chmod +x ~/beacon-telematics/*.sh"
          echo "✅ Deployment scripts uploaded and made executable"
      
      - name: Pre-Deployment Backup
        env:
          DO_SERVER_IP: ${{ secrets.DO_SERVER_IP }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          echo "💾 Creating pre-deployment backup..."
          ssh $DO_USER@$DO_SERVER_IP "~/beacon-telematics/pre-deployment-backup-beacon.sh" || {
            echo "⚠️  Backup script failed but continuing deployment"
          }
          echo "✅ Pre-deployment backup complete"
      
      - name: Deploy to Production
        env:
          DO_SERVER_IP: ${{ secrets.DO_SERVER_IP }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          # Copy gps-tracker folder to production under beacon-telematics directory
          echo "📂 Syncing BeaconTelematics code to production..."
          ssh $DO_USER@$DO_SERVER_IP "mkdir -p ~/beacon-telematics/gps-tracker"
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '__pycache__' \
            --exclude '.env' \
            --exclude 'backend/.env' \
            --exclude '.dart_tool' \
            --exclude 'beacon_telematics_postgres_data' \
            ./gps-tracker/ $DO_USER@$DO_SERVER_IP:~/beacon-telematics/gps-tracker/
          
          echo "🚀 Deploying BeaconTelematics containers..."
          # Deploy on production
          ssh $DO_USER@$DO_SERVER_IP << 'SSHEOF'
            cd ~/beacon-telematics/gps-tracker
            docker compose down --remove-orphans
            docker compose build --no-cache --pull
            docker compose up -d
            
            echo "⏳ Waiting for database to be ready..."
            sleep 15
            
            # Wait for database to be healthy
            echo "🔍 Checking database health..."
            for i in {1..30}; do
              if docker exec beacon_telematics_db pg_isready -U beacon_user >/dev/null 2>&1; then
                echo "✅ Database is ready"
                break
              fi
              echo "⏳ Waiting for database... attempt $i/30"
              sleep 2
            done
            
            echo "⏳ Waiting for backend to start..."
            sleep 20
            
            # Check if backend is actually running
            echo "🔍 Verifying backend container is running..."
            if docker ps --filter name=beacon_telematics_backend --format '{{.Status}}' | grep -q 'Up'; then
              echo "✅ Backend container is running"
            else
              echo "❌ Backend container is not running!"
              docker ps -a --filter name=beacon_telematics_backend
              docker logs beacon_telematics_backend
              exit 1
            fi
            
            echo "📊 Container Status:"
            docker compose ps
            
            echo ""
            echo "=== Database Container ==="
            docker logs --tail 10 beacon_telematics_db
            
            echo ""
            echo "=== Backend Container ==="
            docker logs --tail 20 beacon_telematics_backend
            
            echo ""
            echo "=== Flutter Web Container ==="
            docker logs --tail 20 beacon_telematics_flutter_web
            
            echo ""
            echo "=== Nginx Container ==="
            docker logs --tail 10 beacon_telematics_nginx
          SSHEOF
          echo "✅ BeaconTelematics containers deployed"
      
      - name: Run Database Migrations
        env:
          DO_SERVER_IP: ${{ secrets.DO_SERVER_IP }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          echo "🗄️  Running database migrations..."
          ssh $DO_USER@$DO_SERVER_IP << 'SSHEOF'
            cd ~/beacon-telematics/gps-tracker
            
            # Verify backend is running before migrations
            if ! docker ps --filter name=beacon_telematics_backend --format '{{.Status}}' | grep -q 'Up'; then
              echo "❌ Backend container is not running, cannot run migrations"
              docker ps -a --filter name=beacon_telematics_backend
              exit 1
            fi
            
            echo "🔄 Running Alembic migrations..."
            docker compose exec -T backend alembic upgrade head || {
              echo "⚠️  Migration failed on first attempt, checking backend logs..."
              docker logs --tail 30 beacon_telematics_backend
              echo ""
              echo "⏳ Waiting 15 seconds and retrying..."
              sleep 15
              docker compose exec -T backend alembic upgrade head || {
                echo "❌ Migration failed on second attempt"
                echo "Backend logs:"
                docker logs --tail 50 beacon_telematics_backend
                exit 1
              }
            }
            
            echo "✅ Migrations completed successfully"
          SSHEOF
          echo "✅ Database migrations complete"
      
      - name: Post-Deployment Verification
        env:
          DO_SERVER_IP: ${{ secrets.DO_SERVER_IP }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          echo "🔍 Verifying secrets and configuration..."
          ssh $DO_USER@$DO_SERVER_IP "~/beacon-telematics/verify-secrets-beacon.sh" || {
            echo "❌ Secret verification failed!"
            echo "🔄 Secrets have been auto-restored from backup"
            echo "⚠️  Review logs above for details"
            exit 1
          }
          echo "✅ Secrets verified successfully"
      
      - name: Health Check
        env:
          DO_SERVER_IP: ${{ secrets.DO_SERVER_IP }}
        run: |
          echo "🏥 Checking BeaconTelematics production health..."
          
          # Backend health check with retries
          echo "Testing backend API..."
          for i in {1..10}; do
            if curl -f -s http://$DO_SERVER_IP:8001/api/health > /dev/null; then
              echo "✅ Backend healthy!"
              break
            fi
            echo "Attempt $i/10 failed, waiting..."
            sleep 5
            if [ $i -eq 10 ]; then
              echo "❌ Backend health check failed after 10 attempts"
              exit 1
            fi
          done
          
          # Flutter web check with retries
          echo "Testing Flutter web app..."
          for i in {1..12}; do
            if curl -f -s -I http://$DO_SERVER_IP:3012/ > /dev/null; then
              echo "✅ Flutter web healthy!"
              break
            fi
            echo "Attempt $i/12 failed, waiting..."
            sleep 5
            if [ $i -eq 12 ]; then
              echo "❌ Flutter web health check failed after 12 attempts"
              echo "Container logs:"
              ssh ${{ secrets.DO_USER }}@$DO_SERVER_IP "docker logs --tail 50 beacon_telematics_flutter_web"
              exit 1
            fi
          done
          
          echo "✅ All health checks passed!"
      
      - name: Deployment Summary
        if: always()
        run: |
          echo "================================"
          echo "🚀 BeaconTelematics Deployment Complete!"
          echo "================================"
          echo ""
          echo "📍 Access Points:"
          echo "  Direct Access (via IP):"
          echo "    - Frontend (via nginx): http://${{ secrets.DO_SERVER_IP }}:8080/"
          echo "    - Backend API: http://${{ secrets.DO_SERVER_IP }}:8001/api/health"
          echo "    - Admin Dashboard: http://${{ secrets.DO_SERVER_IP }}:3010/"
          echo "    - Customer Dashboard: http://${{ secrets.DO_SERVER_IP }}:3011/"
          echo "    - Flutter Web (direct): http://${{ secrets.DO_SERVER_IP }}:3012/"
          echo ""
          echo "  Domain Access (after DNS setup):"
          echo "    - HTTP: http://beacontelematics.co.uk:8080/"
          echo "    - HTTPS: https://beacontelematics.co.uk:8443/"
          echo ""
          echo "📋 Rollback Instructions (if needed):"
          echo "   ssh ${{ secrets.DO_USER }}@${{ secrets.DO_SERVER_IP }}"
          echo "   ~/beacon-telematics/rollback-deployment-beacon.sh"
          echo ""
          echo "🎉 BEACON TELEMATICS DEPLOYED!"
          echo ""
          echo "📝 Next Steps:"
          echo "1. ✅ Containers are running"
          echo "2. ✅ Database migrations applied"
          echo "3. ⏳ Configure DNS A records for beacontelematics.co.uk → ${{ secrets.DO_SERVER_IP }}"
          echo "4. ⏳ Run certbot for SSL certificate (see SERVER_SETUP_GUIDE.md Step 3)"
          echo "5. ⏳ Test via: http://beacontelematics.co.uk:8080/"
          echo "================================"
      
      - name: Tag Release
        run: |
          TAG="beacon-prod-$(date +%Y%m%d-%H%M%S)"
          git tag "$TAG"
          git push origin "$TAG" || echo "Could not push tag"
